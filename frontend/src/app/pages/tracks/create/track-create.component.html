<div class="create-page">
  <a class="back-link" routerLink="/">
    <span class="icon">←</span>
    <span>Voltar</span>
  </a>
  <h1 class="title">Criar Track</h1>

  <input type="text" placeholder="ISRC" [(ngModel)]="isrc" class="input" />

  <button (click)="submit()" [disabled]="loading()" class="button">
    {{ loading() ? 'Salvando...' : 'Salvar' }}
  </button>

  <p *ngIf="error() && !loading()" class="error">
    {{ error() }}
  </p>
</div>
