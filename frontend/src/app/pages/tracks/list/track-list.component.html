<div class="tracks-page">
  <div class="tracks-header">
    <h1 class="tracks-title">Tracks</h1>
    <button routerLink="/create" class="button">Criar track</button>
  </div>

  <app-tracks-table *ngIf="tracks()" [tracks]="tracks()!"></app-tracks-table>

  <app-pagination
    *ngIf="tracks()"
    [currentPage]="tracks()!.current_page"
    [lastPage]="tracks()!.last_page"
    (pageChange)="loadTracks($event)"
  ></app-pagination>
</div>
